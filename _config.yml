linkedin_username: jonathonpyles
github_username: JNPyles

title: Jonathon Pyles
description: AI Development & Governance | CRCM | CERP
url: "https://jnpyles.com" 
author:
  name: Jonathon Pyles


# Tell GitHub Pages to use the SEO plugin
plugins:
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# This tells Jekyll how to handle your site
theme: minima

permalink: /:title/
highlighter: rouge

minima:
  skin: dark  # or "dark", "solarized", "solarized-dark"

collections:
  ai_generated:
    output: true
    permalink: /ai_generated/:path/

defaults:
  - scope:
      path: "" # An empty string here means "all files"
      type: "posts"
    values:
      layout: "post"
  - scope:
        path: ""
        type: "ai_generated" # This must match the name in your collections list
      values:
        layout: "post"        # This tells Jekyll to use _layouts/post.html
